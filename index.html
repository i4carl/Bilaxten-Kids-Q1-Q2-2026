<style>
    * { margin: 0; padding: 0; }

    body { height: 100vh; overflow: hidden; }

    :root {
        --width: 1024;
        --height: 768;
    }

    /* Animations */

    .fade-in {
        opacity: 0; /* Initially invisible */
        animation: fadeIn 1s ease-in forwards; /* Apply animation */
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    @keyframes moveLeft {
         0% {
            transform: translateX(150%); /* Start from left */
        }
        100% {
            transform: translateX(0); /* Move to the right */
        }
    }

    @keyframes moveRight {
         0% {
            transform: translateX(-150%); /* Start from left */
        }
        100% {
            transform: translateX(0); /* Move to the right */
        }
    }

    @keyframes moveDown {
         0% {
            transform: translateY(-300px); 
        }
        100% {
            transform: translateY(0);
        }
    }

    @keyframes moveUp {
         0% {
            transform: translateY(300px); 
        }
        100% {
            transform: translateY(0);
        }
    }

    @media screen and (width: 1024px) and (height: 768px) {
        .description-one, .description-two {
            top: calc((621/var(--height)) * 100vh) !important; 
        }            

        .phmat-text-pos {
            top: calc((672/var(--height)) * 100vh) !important;
        }
    }

    @keyframes shakeBoy {
        0%, 100%   { transform: translateX(0); }
        50%        { transform: translateX(-50px); }
    }

    @keyframes shakeGirl {
        0%, 100%   { transform: translateX(0); }
        50%        { transform: translateX(50px); }
    }

    .shakeBoy {
        animation: shakeBoy 1s ease;
    }

    .shakeGirl {
        animation: shakeGirl 1s ease;
    }

</style>
